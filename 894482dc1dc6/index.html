<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>农场养成游戏</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar card">
        <div>
          <p class="eyebrow">前端农场养成游戏</p>
          <h1>田园小农场</h1>
          <p class="subtitle">种植、收获、扩建，把你的农场经营起来。</p>
        </div>
        <button id="resetBtn" class="ghost-btn">重置进度</button>
      </header>

      <main class="layout">
        <section class="panel card status-panel">
          <h2>农场状态</h2>
          <div class="stats-grid">
            <div class="stat"><span>金币</span><strong id="goldStat">0</strong></div>
            <div class="stat"><span>等级</span><strong id="levelStat">1</strong></div>
            <div class="stat"><span>经验</span><strong id="expStat">0 / 100</strong></div>
            <div class="stat"><span>空地</span><strong id="plotStat">0</strong></div>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar"><div id="expBar" class="progress-fill"></div></div>
          </div>
        </section>

        <section class="panel card market-panel">
          <div class="panel-header">
            <h2>种子商店</h2>
            <p>选择一种作物，然后点击土地种下它。</p>
          </div>
          <div id="seedList" class="seed-list"></div>
        </section>

        <section class="panel card farm-panel">
          <div class="panel-header">
            <h2>农田</h2>
            <p>成熟后点击收获；未成熟时可花费少量金币催熟。</p>
          </div>
          <div id="farmGrid" class="farm-grid"></div>
        </section>

        <section class="panel card actions-panel">
          <h2>经营操作</h2>
          <div class="action-list">
            <button id="buyPlotBtn" class="primary-btn">扩建一块土地（50 金币）</button>
            <button id="speedUpBtn" class="secondary-btn">全田催熟一次（20 金币）</button>
            <button id="collectAllBtn" class="secondary-btn">一键收获成熟作物</button>
          </div>
          <div class="tips">
            <p>玩法说明：</p>
            <ul>
              <li>初始有 3 块土地和 120 金币。</li>
              <li>不同作物成熟时间和收益不同。</li>
              <li>升级后会解锁更高价值作物。</li>
              <li>进度会自动保存在浏览器本地。</li>
            </ul>
          </div>
        </section>

        <section class="panel card log-panel">
          <div class="panel-header">
            <h2>农场日志</h2>
            <p>最近 8 条操作记录</p>
          </div>
          <ul id="logList" class="log-list"></ul>
        </section>
      </main>
    </div>

    <template id="seedCardTemplate">
      <button class="seed-card" type="button">
        <div class="seed-card__top">
          <span class="seed-icon"></span>
          <span class="seed-name"></span>
        </div>
        <div class="seed-card__meta">
          <span class="seed-cost"></span>
          <span class="seed-gain"></span>
        </div>
        <small class="seed-time"></small>
      </button>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
