<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pooh Code · 登录</title>
    <link rel="icon" type="image/jpeg" href="/static/brand-icon.jpg" />
    <link rel="stylesheet" href="/static/style.css" />
    <style>
      html, body.auth-page {
        display: flex !important;
        grid-template-columns: none !important;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        height: 100vh;
        width: 100vw;
        margin: 0;
        overflow: auto;
        background: var(--bg, #fafafa);
      }
      .auth-card {
        width: min(420px, 92vw);
        padding: 28px 28px 22px;
        border-radius: 14px;
        background: var(--bg-soft, #fff);
        border: 1px solid var(--border, #e5e5e5);
        box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      }
      .auth-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
      .auth-brand img { width: 36px; height: 36px; border-radius: 8px; }
      .auth-title { font-weight: 700; font-size: 16px; }
      .auth-sub { color: var(--fg-dim, #666); font-size: 13px; margin-bottom: 18px; }
      .auth-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
      .auth-tab { flex: 1; padding: 8px 10px; text-align: center; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: transparent; font-size: 13px; }
      .auth-tab.active { background: #2f7bff; color: #fff; border-color: #2f7bff; }
      .auth-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; font-size: 13px; }
      .auth-field input {
        padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg, #fff); font-size: 14px; outline: none;
      }
      .auth-field input:focus { border-color: #2f7bff; }
      .auth-submit {
        width: 100%; padding: 10px 14px; border-radius: 8px; border: none; background: #2f7bff; color: #fff; font-size: 14px; cursor: pointer;
      }
      .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; }
      .auth-msg { font-size: 12.5px; margin-top: 10px; min-height: 18px; }
      .auth-msg.error { color: #dc2626; }
      .auth-msg.ok { color: #059669; }
    </style>
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="/static/brand-icon.jpg" alt="Pooh Code" />
        <div>
          <div class="auth-title">Pooh Code</div>
          <div class="auth-sub">请先登录或注册使用</div>
        </div>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      <form id="auth-form" autocomplete="on">
        <label class="auth-field">
          <span>邮箱</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
        </label>
        <label class="auth-field">
          <span>密码</span>
          <input type="password" name="password" required minlength="8" autocomplete="current-password" placeholder="至少 8 位" />
        </label>
        <button type="submit" class="auth-submit" id="auth-submit">登录</button>
        <div class="auth-msg" id="auth-msg"></div>
      </form>
    </div>

    <script>
      (() => {
        const form = document.getElementById("auth-form");
        const submit = document.getElementById("auth-submit");
        const msg = document.getElementById("auth-msg");
        const pwInput = form.querySelector("input[name=password]");
        let mode = "login";

        document.querySelectorAll(".auth-tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            mode = btn.dataset.tab;
            document.querySelectorAll(".auth-tab").forEach((b) => b.classList.toggle("active", b === btn));
            submit.textContent = mode === "login" ? "登录" : "注册";
            pwInput.autocomplete = mode === "login" ? "current-password" : "new-password";
            msg.textContent = "";
            msg.className = "auth-msg";
          });
        });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const data = new FormData(form);
          const body = {
            email: data.get("email") || "",
            password: data.get("password") || "",
          };
          submit.disabled = true;
          msg.textContent = "";
          msg.className = "auth-msg";
          try {
            const resp = await fetch(`/api/auth/${mode}`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
              credentials: "same-origin",
            });
            const json = await resp.json().catch(() => ({}));
            if (!resp.ok || !json.ok) {
              throw new Error(json.error || `HTTP ${resp.status}`);
            }
            msg.textContent = mode === "login" ? "登录成功，正在跳转…" : "注册成功，正在跳转…";
            msg.className = "auth-msg ok";
            window.location.href = "/";
          } catch (err) {
            msg.textContent = err.message || "请求失败";
            msg.className = "auth-msg error";
          } finally {
            submit.disabled = false;
          }
        });

        // 已登录用户直接跳回主页
        fetch("/api/auth/me", { credentials: "same-origin" })
          .then((r) => (r.ok ? r.json() : null))
          .then((j) => { if (j && j.ok) window.location.href = "/"; })
          .catch(() => {});
      })();
    </script>
  </body>
</html>
