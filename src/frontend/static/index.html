<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pooh Code</title>
  <link rel="icon" type="image/png" href="/static/favicon-pooh.png?v=20260419c" />
  <link rel="apple-touch-icon" href="/static/favicon-pooh.png?v=20260419c" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/static/vendor/highlight.github.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div class="app" id="app">
    <aside class="pane left-pane" id="left-pane">
      <div class="pane-head">
        <div class="logo">
          <div class="logo-mark" aria-label="Pooh Code">
            <img src="/static/logo.jpg?v=20260418d" alt="pooh code logo" />
          </div>
          <div class="logo-name">Pooh Code</div>
        </div>
        <div class="spacer"></div>
        <button class="icon-btn" id="btn-refresh" title="刷新">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
            <path d="M21 3v5h-5"></path>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            <path d="M3 21v-5h5"></path>
          </svg>
        </button>
        <button class="icon-btn" id="btn-collapse-left" title="折叠左栏" aria-label="折叠左栏">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 6-6 6 6 6"></path>
          </svg>
        </button>
      </div>

      <div class="search">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input id="session-search" placeholder="搜索会话与产物…" autocomplete="off" />
        <kbd>⌘K</kbd>
      </div>

      <button class="new-chat" id="btn-new" type="button">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
        新建会话
        <span class="kbd">⌘N</span>
      </button>

      <div class="convo-list" id="session-list"></div>

      <div class="user-card">
        <div class="avatar" id="user-avatar">·</div>
        <div class="user-meta">
          <div class="name" id="user-email" title="当前登录邮箱">—</div>
          <div class="plan" id="session-id">—</div>
        </div>
        <button class="icon-btn" id="btn-logout" title="退出登录" aria-label="退出登录">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <path d="m16 17 5-5-5-5"></path>
            <path d="M21 12H9"></path>
          </svg>
        </button>
      </div>
    </aside>

    <main class="pane middle-pane" id="middle-pane">
      <div class="pane-head chat-head">
        <div class="path">
          <span class="cur" id="chat-title" title="双击重命名会话">开始一段新对话</span>
        </div>
        <div class="spacer"></div>
        <span class="model" id="model-badge"><span class="pulse" id="status-pulse"></span> <span
            id="model-label">—</span><span class="model-switcher hidden" id="model-switcher"
            title="切换图片生成模型"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m6 9 6 6 6-6"></path>
            </svg><select id="image-model" aria-label="切换图片生成模型"></select></span></span>
        <button class="icon-btn" id="btn-compact" title="压缩上下文">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9h16"></path>
            <path d="M4 15h16"></path>
            <path d="m8 5-4 4 4 4"></path>
            <path d="m16 11 4 4-4 4"></path>
          </svg>
        </button>
        <button class="icon-btn" id="btn-stop" title="停止当前会话">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="6" width="12" height="12" rx="2"></rect>
          </svg>
        </button>
      </div>

      <div class="agent-status" id="agent-status" data-level="idle">
        <div class="agent-status-indicator" aria-hidden="true">
          <span class="agent-status-spinner"></span>
        </div>
        <div class="agent-status-body">
          <div class="agent-status-title" id="agent-status-title">就绪</div>
          <div class="agent-status-detail" id="agent-status-detail">等待你的指令</div>
        </div>
        <div class="agent-status-meta">
          <span class="agent-status-timer" id="agent-status-timer"></span>
        </div>
      </div>

      <div class="chat-scroll" id="messages">
        <div class="chat-inner" id="chat-inner">
          <div class="empty" id="empty-hint">
            <div class="empty-welcome">
              <div class="empty-title">开始和 Pooh Code 对话</div>
              <div class="empty-sub">支持云端写代码、修改代码、文件处理、图片视频分析与动态技能加载</div>
            </div>
          </div>
        </div>
      </div>
      <button class="scroll-btn hidden" id="scroll-btn" title="回到底部" aria-label="回到底部">↓</button>

      <div class="composer-wrap">
        <form class="composer" id="composer" autocomplete="off">
          <div class="reply-ctx hidden" id="reply-ctx">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.75"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 17 4 12l5-5M4 12h9a7 7 0 0 1 7 7v1"></path>
            </svg>
            <span id="reply-ctx-text">引用</span>
            <button type="button" class="x icon-btn" id="reply-ctx-clear" aria-label="取消引用">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18M6 6l12 12"></path>
              </svg>
            </button>
          </div>

          <div class="attachment-row hidden" id="file-preview-bar"></div>

          <div class="reference-bar hidden" id="image-reference-bar">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.75"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10"></path>
              <circle cx="9" cy="9" r="2"></circle>
              <path d="m21 15-3.1-3.1a2 2 0 0 0-2.83 0L6 21"></path>
              <path d="M16 19h6"></path>
              <path d="M19 16v6"></path>
            </svg>
            <span class="reference-bar-text">基于：<span id="image-reference-name">—</span></span>
            <button type="button" class="x icon-btn" id="image-reference-clear" aria-label="取消参考图">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18M6 6l12 12"></path>
              </svg>
            </button>
          </div>

          <textarea id="input" rows="1" placeholder="继续这段对话，或者拖拽文件到这里…"></textarea>

          <div class="row">
            <button type="button" class="icon-btn" id="btn-attach" title="附件">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.99 8.83l-8.48 8.48a2 2 0 0 1-2.83-2.83l8.48-8.48">
                </path>
              </svg>
            </button>
            <button type="button" class="chip mode-toggle" id="btn-image-mode" title="切换到图片生成模式">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3.5" y="4" width="17" height="16" rx="3"></rect>
                <circle cx="9" cy="9" r="1.5"></circle>
                <path d="m6.5 17 4.4-4.4a1.5 1.5 0 0 1 2.12 0L17.5 17"></path>
                <path d="m13.5 17 1.8-1.8a1.5 1.5 0 0 1 2.12 0L19 16.8"></path>
              </svg>
              图片生成
            </button>
            <label class="chip aspect-select hidden" id="image-aspect-wrap" title="图片比例">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <path d="M3 12h18"></path>
              </svg>
              <select id="image-aspect-ratio" aria-label="图片比例">
                <option value="1:1">1:1</option>
                <option value="2:3">2:3</option>
                <option value="3:2">3:2</option>
                <option value="3:4">3:4</option>
                <option value="4:3">4:3</option>
                <option value="4:5">4:5</option>
                <option value="5:4">5:4</option>
                <option value="9:16">9:16</option>
                <option value="16:9">16:9</option>
                <option value="21:9">21:9</option>
              </select>
            </label>
            <label class="chip aspect-select hidden" id="image-resolution-wrap" title="图片清晰度">
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"></path>
              </svg>
              <select id="image-resolution" aria-label="图片清晰度"></select>
            </label>
            <button type="button" class="chip" data-cmd="/tools">/tools</button>
            <button type="button" class="chip" data-cmd="/skills">/skills</button>
            <div class="spacer"></div>
            <span class="chip ghost" id="usage-label" title="上下文使用量">⌘↵ 发送</span>
            <button type="submit" class="send" id="btn-send" title="发送" aria-label="发送">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 19V5M5 12l7-7 7 7"></path>
              </svg>
            </button>
          </div>
          <input type="file" id="file-input" multiple hidden
            accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.csv,.tsv,.txt,.md,.json" />
        </form>
      </div>
    </main>

    <aside class="pane right-pane" id="right-pane">
      <div class="pane-head">
        <button class="icon-btn" id="btn-collapse-right" title="折叠右栏" aria-label="折叠右栏">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 6 6 6-6 6"></path>
          </svg>
        </button>
        <div class="title-sm">Minimap</div>
        <div class="spacer"></div>
        <button class="icon-btn" id="btn-minimap-jump" title="回到底部" aria-label="回到底部">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14"></path>
            <path d="m5 12 7 7 7-7"></path>
          </svg>
        </button>
      </div>
      <div class="minimap" id="minimap">
        <div class="minimap-inner" id="minimap-inner">
          <div class="mm-canvas" id="mm-canvas"></div>
          <div class="mm-viewport" id="mm-viewport"></div>
        </div>
      </div>
    </aside>

    <div class="col-divider" id="col-divider-left" title="拖动调整左栏宽度">
      <div class="col-divider-grip"></div>
    </div>
    <div class="col-divider" id="col-divider-right" title="拖动调整右栏宽度">
      <div class="col-divider-grip"></div>
    </div>

    <button class="collapse-handle collapse-handle-left" id="btn-expand-left" type="button" title="展开左栏"
      aria-label="展开左栏">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 6 6 6-6 6"></path>
      </svg>
    </button>
    <button class="collapse-handle collapse-handle-right" id="btn-expand-right" type="button" title="展开右栏"
      aria-label="展开右栏">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 6-6 6 6 6"></path>
      </svg>
    </button>
  </div>

  <div class="image-lightbox hidden" id="image-lightbox" aria-hidden="true">
    <button class="image-lightbox-close" id="image-lightbox-close" type="button" aria-label="关闭图片预览">×</button>
    <div class="image-lightbox-dialog" id="image-lightbox-dialog" role="dialog" aria-modal="true" aria-label="图片预览">
      <div class="image-lightbox-frame">
        <img id="image-lightbox-img" alt="" />
      </div>
      <div class="image-lightbox-meta">
        <div class="image-lightbox-name" id="image-lightbox-name">—</div>
        <div class="image-lightbox-note">点击空白处或按 Esc 关闭</div>
      </div>
    </div>
  </div>

  <div class="confirm-dialog hidden" id="confirm-dialog" aria-hidden="true">
    <div class="confirm-dialog-card" role="dialog" aria-modal="true" aria-labelledby="confirm-dialog-title">
      <div class="confirm-dialog-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <h2 class="confirm-dialog-title" id="confirm-dialog-title">提示</h2>
      <div class="confirm-dialog-body" id="confirm-dialog-body"></div>
      <div class="confirm-dialog-actions">
        <button type="button" class="confirm-dialog-btn confirm-dialog-cancel" id="confirm-dialog-cancel">取消</button>
        <button type="button" class="confirm-dialog-btn confirm-dialog-ok" id="confirm-dialog-ok">确认</button>
      </div>
    </div>
  </div>

  <div class="selection-quote hidden" id="selection-quote" aria-hidden="true">
    <button class="selection-quote-btn" id="selection-quote-btn" type="button" aria-label="引用选中文本">
      <span class="selection-quote-mark">❝</span>
      <span>引用到输入框</span>
    </button>
  </div>

  <script src="/static/vendor/highlight.common.min.js"></script>
  <script src="/static/vendor/beautify.min.js"></script>
  <script src="/static/vendor/beautify-html.min.js"></script>
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>

</html>
