<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pooh Code</title>
    <link rel="icon" type="image/jpeg" href="/static/brand-icon.jpg" />
    <link rel="stylesheet" href="/static/vendor/highlight.github.min.css" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <img class="brand-icon" src="/static/brand-icon.jpg" alt="Pooh Code icon" />
        </div>
        <div class="brand-copy">
          <div class="brand-title">Pooh Code</div>
          <div class="brand-sub" id="model-label">—</div>
        </div>
      </div>

      <div class="side-actions">
        <button class="btn primary" id="btn-new">+ 新会话</button>
        <button class="btn" id="btn-refresh">刷新</button>
      </div>

      <div class="side-section side-section-sessions">
        <div class="session-list" id="session-list"></div>
      </div>

      <div class="side-section side-section-files">
        <div class="side-header side-header-files">
          <span>产物归档</span>
          <span class="side-header-meta" id="files-summary">—</span>
        </div>
        <div class="file-groups" id="file-groups"></div>
      </div>

      <div class="side-footer">
        <div class="meta-row"><span>session</span><span id="session-id">—</span></div>
        <div class="meta-row"><span>usage</span><span id="usage-label">—</span></div>
      </div>
    </aside>

    <div class="sidebar-resizer" id="sidebar-resizer" aria-hidden="true"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="sidebar-toggle" id="sidebar-toggle" title="切换侧栏" aria-label="切换侧栏">☰</button>
          <span class="dot" id="status-dot"></span>
          <span id="status-text">就绪</span>
        </div>
        <div class="topbar-right">
          <button class="pill theme-toggle" id="theme-toggle" type="button" title="切换明暗模式" aria-label="切换明暗模式">
            <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
            <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <div class="content-row">
        <div class="messages-wrapper">
          <section class="messages" id="messages">
            <div class="empty" id="empty-hint">
              <div class="empty-title">开始和 Pooh Code 对话</div>
              <div class="empty-sub">支持 <code>/help</code>、<code>/new</code>、<code>/compact</code> 等命令</div>
            </div>
          </section>
          <button class="scroll-btn hidden" id="scroll-btn" title="回到底部" aria-label="回到底部">↓</button>
        </div>
        <aside class="chat-nav" id="chat-nav">
          <button class="nav-toggle" id="nav-toggle" title="切换导航" aria-label="切换导航">›</button>
          <div class="chat-nav-cmds">
            <div class="side-header">快捷命令</div>
            <div class="cmd-row">
              <button class="chip" data-cmd="/help">/help</button>
              <button class="chip" data-cmd="/ctx">/ctx</button>
              <button class="chip" data-cmd="/sessions">/sessions</button>
              <button class="chip" data-cmd="/skills">/skills</button>
              <button class="chip" data-cmd="/compact">/compact</button>
              <button class="chip" data-cmd="/clear">/clear</button>
            </div>
          </div>
          <div class="chat-nav-list" id="chat-nav-list"></div>
        </aside>
      </div>

      <form class="composer" id="composer">
        <div class="file-preview-bar" id="file-preview-bar"></div>
        <div class="composer-row">
          <button type="button" class="btn icon-btn" id="btn-attach" title="上传文件">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <textarea
            id="input"
            rows="1"
            placeholder="输入消息，Enter 发送 / Shift+Enter 换行，以 / 开头执行命令"
            autocomplete="off"
          ></textarea>
          <button type="button" class="btn" id="btn-stop">停止</button>
          <button type="submit" class="btn primary" id="btn-send">发送</button>
        </div>
        <input type="file" id="file-input" multiple hidden
          accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.csv,.tsv,.txt,.md,.json" />
      </form>
    </main>

    <script src="/static/vendor/highlight.common.min.js"></script>
    <script src="/static/vendor/beautify.min.js"></script>
    <script src="/static/vendor/beautify-html.min.js"></script>
    <script src="/static/vendor/marked.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
