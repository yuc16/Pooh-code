<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pooh Code — 聊天助手</title>
  <link rel="icon" type="image/jpeg" href="/static/brand-icon.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="/static/vendor/highlight.github.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div class="app" id="app">
    <aside class="pane left-pane" id="left-pane">
      <div class="pane-head">
        <div class="logo">
          <div class="logo-mark" aria-label="Pooh Code">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7.5" cy="5.5" r="2.2" fill="currentColor" opacity="0.9"></circle>
              <circle cx="16.5" cy="5.5" r="2.2" fill="currentColor" opacity="0.9"></circle>
              <path d="M4 12c0-3.3 3.6-5.5 8-5.5s8 2.2 8 5.5v5a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3z" fill="currentColor"
                opacity="0.25"></path>
              <path d="M4 12c0-3.3 3.6-5.5 8-5.5s8 2.2 8 5.5v5a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3z"></path>
              <path d="M9 14h6" stroke-width="1.4"></path>
            </svg>
          </div>
          <div class="logo-name">Pooh <em>Code</em></div>
        </div>
        <div class="spacer"></div>
        <button class="icon-btn" id="btn-refresh" title="刷新">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
            <path d="M21 3v5h-5"></path>
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            <path d="M3 21v-5h5"></path>
          </svg>
        </button>
      </div>

      <div class="search">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input id="session-search" placeholder="搜索会话与产物…" autocomplete="off" />
        <kbd>⌘K</kbd>
      </div>

      <button class="new-chat" id="btn-new" type="button">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"></path>
        </svg>
        新建会话
        <span class="kbd">⌘N</span>
      </button>

      <div class="convo-list" id="session-list"></div>

      <div class="user-card">
        <div class="avatar" id="user-avatar">·</div>
        <div class="user-meta">
          <div class="name" id="user-email" title="当前登录邮箱">—</div>
          <div class="plan" id="session-id">—</div>
        </div>
        <button class="icon-btn" id="btn-logout" title="退出登录" aria-label="退出登录">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <path d="m16 17 5-5-5-5"></path>
            <path d="M21 12H9"></path>
          </svg>
        </button>
      </div>
    </aside>

    <main class="pane middle-pane" id="middle-pane">
      <div class="pane-head chat-head">
        <div class="path">
          <span class="cur" id="chat-title" title="双击重命名会话">开始一段新对话</span>
        </div>
        <div class="spacer"></div>
        <span class="model" id="model-badge"><span class="pulse" id="status-pulse"></span> <span
            id="model-label">—</span></span>
        <button class="icon-btn" id="btn-compact" title="压缩上下文">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9h16"></path>
            <path d="M4 15h16"></path>
            <path d="m8 5-4 4 4 4"></path>
            <path d="m16 11 4 4-4 4"></path>
          </svg>
        </button>
        <button class="icon-btn" id="btn-stop" title="停止当前会话">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="6" width="12" height="12" rx="2"></rect>
          </svg>
        </button>
      </div>

      <div class="agent-status" id="agent-status" data-level="idle">
        <div class="agent-status-indicator" aria-hidden="true">
          <span class="agent-status-spinner"></span>
        </div>
        <div class="agent-status-body">
          <div class="agent-status-title" id="agent-status-title">就绪</div>
          <div class="agent-status-detail" id="agent-status-detail">等待你的指令</div>
        </div>
        <div class="agent-status-meta">
          <span class="agent-status-timer" id="agent-status-timer"></span>
          <button class="agent-status-close" id="agent-status-close" type="button" title="收起状态栏"
            aria-label="收起状态栏">×</button>
        </div>
      </div>

      <div class="chat-scroll" id="messages">
        <div class="chat-inner" id="chat-inner">
          <div class="empty" id="empty-hint">
            <div class="empty-welcome">
              <div class="empty-title">开始和 Pooh Code 对话</div>
              <div class="empty-sub">内置GPT-5.4，支持云端写代码、修改代码、office文件处理、图片视频分析与动态技能加载
              </div>
            </div>
          </div>
        </div>
        <button class="scroll-btn hidden" id="scroll-btn" title="回到底部" aria-label="回到底部">↓</button>

        <div class="composer-wrap">
          <form class="composer" id="composer" autocomplete="off">
            <div class="reply-ctx hidden" id="reply-ctx">
              <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.75"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 17 4 12l5-5M4 12h9a7 7 0 0 1 7 7v1"></path>
              </svg>
              <span id="reply-ctx-text">引用</span>
              <button type="button" class="x icon-btn" id="reply-ctx-clear" aria-label="取消引用">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.75"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 6 6 18M6 6l12 12"></path>
                </svg>
              </button>
            </div>

            <div class="attachment-row hidden" id="file-preview-bar"></div>

            <textarea id="input" rows="1" placeholder="继续这段对话，或者拖拽文件到这里…"></textarea>

            <div class="row">
              <button type="button" class="icon-btn" id="btn-attach" title="附件">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.99 8.83l-8.48 8.48a2 2 0 0 1-2.83-2.83l8.48-8.48">
                  </path>
                </svg>
              </button>
              <button type="button" class="chip" data-cmd="/help">/help</button>
              <button type="button" class="chip" data-cmd="/skills">/skills</button>
              <button type="button" class="chip" data-cmd="/clear">/clear</button>
              <button type="button" class="chip" data-cmd="/compact">/compact</button>
              <div class="spacer"></div>
              <span class="chip ghost" id="usage-label" title="上下文使用量">⌘↵ 发送</span>
              <button type="submit" class="send" id="btn-send" title="发送" aria-label="发送">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.75"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12 19V5M5 12l7-7 7 7"></path>
                </svg>
              </button>
            </div>
            <input type="file" id="file-input" multiple hidden
              accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.csv,.tsv,.txt,.md,.json" />
          </form>
        </div>
    </main>

    <aside class="pane right-pane" id="right-pane">
      <div class="pane-head">
        <div class="title-sm">Minimap</div>
        <div class="spacer"></div>
        <button class="icon-btn" id="btn-minimap-jump" title="回到底部" aria-label="回到底部">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.75"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14"></path>
            <path d="m5 12 7 7 7-7"></path>
          </svg>
        </button>
      </div>
      <div class="minimap" id="minimap">
        <div class="minimap-inner" id="minimap-inner">
          <div class="mm-canvas" id="mm-canvas"></div>
          <div class="mm-viewport" id="mm-viewport"></div>
        </div>
      </div>
    </aside>

    <div class="col-divider" id="col-divider-left" title="拖动调整左栏宽度">
      <div class="col-divider-grip"></div>
    </div>
    <div class="col-divider" id="col-divider-right" title="拖动调整右栏宽度">
      <div class="col-divider-grip"></div>
    </div>
  </div>

  <script src="/static/vendor/highlight.common.min.js"></script>
  <script src="/static/vendor/beautify.min.js"></script>
  <script src="/static/vendor/beautify-html.min.js"></script>
  <script src="/static/vendor/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>

</html>
